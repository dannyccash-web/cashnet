<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashworld</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }

/* ── Setup Screen ──────────────────────────────────────────────── */
#setup-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(160deg, #0d1b2a 0%, #1b2838 50%, #0f3460 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; color: white;
}
#setup-screen h1 { font-size: 3.2em; margin-bottom: 6px; color: #a5d6a7; letter-spacing: 2px; text-shadow: 0 0 30px rgba(165,214,167,0.4); }
#setup-screen .subtitle { font-size: 1.05em; color: #80cbc4; margin-bottom: 40px; font-weight: 300; letter-spacing: 1px; }
.setup-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px 40px; width: 420px; }
.setup-section { margin-bottom: 22px; }
.setup-section label { display: block; margin-bottom: 10px; color: #b0bec5; font-size: 0.82em; text-transform: uppercase; letter-spacing: 1.5px; }
#player-name-input {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
  color: white; padding: 11px 16px; border-radius: 8px; font-size: 1em;
  width: 100%; outline: none; text-align: center; transition: border-color 0.2s;
}
#player-name-input:focus { border-color: rgba(165,214,167,0.6); }
#player-name-input::placeholder { color: rgba(255,255,255,0.3); }
.color-row { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch {
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent; transition: all 0.15s; position: relative;
}
.swatch.selected { border-color: white; transform: scale(1.2); }
.swatch:hover:not(.selected) { transform: scale(1.1); }
#enter-btn {
  width: 100%; padding: 14px; background: linear-gradient(135deg, #a5d6a7, #80cbc4);
  color: #1a1a2e; border: none; border-radius: 10px; font-size: 1.05em; font-weight: 700;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; margin-top: 6px;
}
#enter-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(165,214,167,0.3); }
#enter-btn:active { transform: translateY(0); }

/* ── Chat Panel ─────────────────────────────────────────────────── */
#chat-panel {
  position: fixed; right: 0; top: 0; height: 100%; width: 360px;
  background: rgba(10, 14, 28, 0.96); backdrop-filter: blur(12px);
  border-left: 1px solid rgba(255,255,255,0.08);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  z-index: 100;
}
#chat-panel.open { transform: translateX(0); }
#chat-header {
  padding: 15px 18px; display: flex; align-items: center; gap: 11px;
  border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
}
#chat-avatar-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
#chat-persona-name { color: white; font-weight: 600; font-size: 1.05em; flex: 1; }
#chat-location { color: rgba(255,255,255,0.4); font-size: 0.78em; }
#chat-close {
  background: none; border: none; color: rgba(255,255,255,0.4);
  font-size: 1.3em; cursor: pointer; padding: 4px 6px; line-height: 1;
  transition: color 0.15s; border-radius: 4px;
}
#chat-close:hover { color: white; background: rgba(255,255,255,0.08); }
#chat-messages {
  flex: 1; overflow-y: auto; padding: 14px; display: flex;
  flex-direction: column; gap: 9px;
}
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
.msg { max-width: 88%; padding: 9px 13px; border-radius: 14px; font-size: 0.91em; line-height: 1.45; word-break: break-word; }
.msg.user { align-self: flex-end; background: #2d4a6e; color: #e8f4ff; border-bottom-right-radius: 4px; }
.msg.npc { align-self: flex-start; color: #f0f0f0; border-bottom-left-radius: 4px; }
.msg.typing { opacity: 0.55; font-style: italic; }
.msg.system { align-self: center; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); font-size: 0.8em; border-radius: 8px; padding: 5px 10px; }
#chat-input-area {
  padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; gap: 8px; flex-shrink: 0;
}
#chat-input {
  flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  color: white; padding: 10px 14px; border-radius: 20px; font-size: 0.9em;
  outline: none; transition: border-color 0.2s;
}
#chat-input:focus { border-color: rgba(255,255,255,0.25); }
#chat-input::placeholder { color: rgba(255,255,255,0.3); }
#chat-send {
  background: #a5d6a7; color: #1a1a2e; border: none; border-radius: 50%;
  width: 38px; height: 38px; cursor: pointer; font-size: 1.1em; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
#chat-send:hover:not(:disabled) { background: #80cbc4; transform: scale(1.08); }
#chat-send:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Proximity Prompt ───────────────────────────────────────────── */
#proximity-prompt {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); color: white; padding: 9px 18px;
  border-radius: 18px; font-size: 0.88em; pointer-events: none;
  opacity: 0; transition: opacity 0.25s; z-index: 50;
  border: 1px solid rgba(255,255,255,0.15); white-space: nowrap;
}
#proximity-prompt.visible { opacity: 1; }

/* ── HUD ────────────────────────────────────────────────────────── */
#hud {
  position: fixed; top: 14px; left: 14px;
  color: rgba(255,255,255,0.55); font-size: 0.78em; z-index: 50;
  line-height: 1.7; pointer-events: none;
}
</style>
</head>

// ═══════════════════════════════════════════════════════════════════
//  CHARACTER DRAWING
// ═══════════════════════════════════════════════════════════════════
function drawChar(g, cfg, waving = false) {
  g.clear();
  const {
    skinTone = 0xf5cba7, hairColor = 0x5d3a1a,
    shirtColor = 0x3d5a80, pantsColor = 0x2c3e50,
    eyeColor = 0x222222, isRobot = false,

  } = cfg;

  // Shadow
  g.fillStyle(0x000000, 0.18);
  g.fillEllipse(0, 28, 34, 11);

  // Legs
  g.fillStyle(pantsColor, 1);
  g.fillRoundedRect(-13, 10, 11, 17, 3);
  g.fillRoundedRect(2, 10, 11, 17, 3);

  // Shoes
  g.fillStyle(0x1a1a1a, 1);
  g.fillRoundedRect(-15, 24, 13, 6, 2);
  g.fillRoundedRect(2, 24, 13, 6, 2);

  // Body
  g.fillStyle(shirtColor, 1);
  g.fillRoundedRect(-15, -12, 30, 24, 7);

  // Left arm (static)
  g.fillStyle(shirtColor, 1);
  g.fillRoundedRect(-24, -10, 11, 22, 5);

  // Right arm (raised if waving)
  if (waving) {
    g.fillRoundedRect(13, -28, 11, 22, 5);
  } else {
    g.fillRoundedRect(13, -10, 11, 22, 5);
  }

  // Hands
  g.fillStyle(skinTone, 1);
  g.fillCircle(-18, 13, 5);
  g.fillCircle(18, waving ? -7 : 13, 5);

  // Neck
  g.fillStyle(skinTone, 1);
  g.fillRoundedRect(-5, -20, 10, 10, 2);

  // Flames for Chris (drawn behind head)
  if (hasFlames) {
    const flameColors = [0xff6d00, 0xffab00, 0xff3d00];
    flameColors.forEach((c, i) => {
      g.fillStyle(c, 0.85 - i * 0.15);
      g.fillTriangle(-8 + i * 6, -44, -14 + i * 6, -62 + i * 3, 0 + i * 4, -44);
    });
    g.fillStyle(0xffab00, 0.6);
    g.fillTriangle(-4, -44, -2, -70, 8, -44);
  }

  // Hair (drawn first so head covers bottom of hair)
  if (hairColor !== null && !isRobot) {
    g.fillStyle(hairColor, 1);
    g.fillCircle(0, -38, 20); // hair cap sitting above/behind head
  }

  // Head
  g.fillStyle(skinTone, 1);
  g.fillCircle(0, -34, 16);

  // Cheek blush (subtle)
  g.fillStyle(0xff8a80, 0.2);
  g.fillCircle(-9, -31, 5);
  g.fillCircle(9, -31, 5);

  // Robot sheen
  if (isRobot) {
    g.fillStyle(0xe0e0e0, 0.35);
    g.fillCircle(-4, -38, 7);
    // Exposed metal band on forehead
    g.fillStyle(0x757575, 1);
    g.fillRoundedRect(-10, -44, 20, 5, 2);
  }

  // Eyes whites
  g.fillStyle(0xffffff, 1);
  g.fillCircle(-6, -35, 5);
  g.fillCircle(6, -35, 5);

  // Pupils / irises
  g.fillStyle(eyeColor, 1);
  g.fillCircle(-6, -35, 3);
  g.fillCircle(6, -35, 3);

  // Eye shine
  g.fillStyle(0xffffff, 0.8);
  g.fillCircle(-5, -36, 1.2);
  g.fillCircle(7, -36, 1.2);

  // Smile (arc via line)
  g.lineStyle(2, 0x333333, 0.85);
  g.beginPath();
  g.arc(0, -29, 6, 0.2 * Math.PI, 0.8 * Math.PI, false);
  g.strokePath();

  // Zit for Chris
  if (cfg.hasZit !== false && hasFlames) {
    g.fillStyle(0xff5252, 1);
    g.fillCircle(8, -32, 2.5);
  }
}

// ═══════════════════════════════════════════════════════════════════
//  PHASER SCENE
// ═══════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() {
    super({ key: 'GameScene' });
    this.npcs = {};
    this.player = null;
    this.cursors = null;
    this.wasd = null;
    this.eKey = null;
    this.proximateNPC = null;
    this.eWasDown = false;
    this.holeGfx = null;
    this.holeAngle = 0;
  }

  preload() {} // fully procedural, nothing to load

  create() {
    const W = 2400, H = 1800;

    // ── Static World ──────────────────────────────────────────────
    const world = this.add.graphics();
    this.drawWorld(world, W, H);

    // ── NPCs ──────────────────────────────────────────────────────
    Object.entries(PERSONAS).forEach(([id, p]) => {
      const container = this.add.container(p.startX, p.startY);
      const gfx = this.add.graphics();
      drawChar(gfx, p.visual);
      const label = this.add.text(0, -64, p.name, {
        fontSize: '11px', color: '#ffffff',
        stroke: '#000000', strokeThickness: 3,
        resolution: 2
      }).setOrigin(0.5, 1);
      container.add([gfx, label]);
      container.setDepth(p.startY);

      this.npcs[id] = {
        id, container, gfx, label,
        cfg: p.visual,
        pos: { x: p.startX, y: p.startY },
        target: { x: p.startX, y: p.startY },
        state: 'idle',
        idleTimer: 1000 + Math.random() * 3000,
        walkAnim: Math.random() * Math.PI * 2,
        waving: false,
        speed: 55 + Math.random() * 20,
        homeArea: p.homeArea,
        facing: 1
      };
    });

    // ── Player ────────────────────────────────────────────────────
    const px = 1100, py = 800;
    const pContainer = this.add.container(px, py);
    const pGfx = this.add.graphics();
    drawChar(pGfx, {
      skinTone: playerConfig.skinTone,
      hairColor: playerConfig.hairColor,
      shirtColor: playerConfig.shirtColor,
      pantsColor: 0x263238,
      eyeColor: 0x222222
    });
    const pLabel = this.add.text(0, -64, playerConfig.name || 'You', {
      fontSize: '11px', color: '#a5d6a7',
      stroke: '#000000', strokeThickness: 3,
      resolution: 2
    }).setOrigin(0.5, 1);
    const indicator = this.add.text(0, -78, '▼', {
      fontSize: '10px', color: '#a5d6a7', resolution: 2
    }).setOrigin(0.5, 1);
    pContainer.add([pGfx, pLabel, indicator]);
    pContainer.setDepth(py);

    this.player = {
      container: pContainer, gfx: pGfx, label: pLabel,
      pos: { x: px, y: py },
      walkAnim: 0, facing: 1,
      cfg: { skinTone: playerConfig.skinTone, hairColor: playerConfig.hairColor, shirtColor: playerConfig.shirtColor, pantsColor: 0x263238, eyeColor: 0x222222 }
    };

    // ── Camera ────────────────────────────────────────────────────
    this.cameras.main.setZoom(1.8);
    this.cameras.main.setBounds(0, 0, W, H);
    this.cameras.main.startFollow(pContainer, true, 0.08, 0.08);

    // ── Input ─────────────────────────────────────────────────────
    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys('W,A,S,D');
    this.eKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);

    // store scene ref globally
    gameScene = this;
  }

    g.fillStyle(0x1a1a1a, 1);
    g.fillCircle(325, 782, 10); g.fillCircle(385, 782, 10);
    g.fillStyle(0xffcc02, 0.8); g.fillCircle(400, 752, 7);
    // Trees
    this.plantTree(g, 500, 620); this.plantTree(g, 450, 800);

    // The Hole — drawn dynamically (see drawHole method called in update)
    this.holeX = 590; this.holeY = 860;

    // ── DANNY'S STUDIO ───────────────────────────────────────────

    this.drawHouse(g, 100, 110, 320, 240, 0x558b2f, 0x33691e, "Danny's Studio");
    // Art on studio wall (simple painting rects)
    g.fillStyle(0xfff176, 1); g.fillRect(160, 160, 40, 30);
    g.fillStyle(0xef9a9a, 1); g.fillRect(215, 155, 30, 40);
    g.fillStyle(0x80cbc4, 1); g.fillRect(258, 165, 35, 28);
    this.plantTree(g, 480, 150); this.plantTree(g, 520, 320);
    this.addWorldLabel(g, 280, 92, "DANNY'S STUDIO");

    // ── HIKES POINT ──────────────────────────────────────────────
    this.drawZone(g, 1650, 560, 680, 400, 0x7986cb, 0x5c6bc0, null);
    this.drawHouse(g, 1680, 600, 215, 220, 0x9fa8da, 0x7986cb, "Brent's");
    this.drawHouse(g, 1960, 600, 215, 220, 0xef9a9a, 0xe57373, "Brian's");
    this.plantTree(g, 1900, 620); this.plantTree(g, 2180, 750);
    // Vintage toy in Brian's yard
    g.fillStyle(0xe65100, 1); g.fillRect(2165, 740, 25, 30);

    this.drawZone(g, 1660, 80, 700, 420, 0xc62828, 0xb71c1c, null);

    g.fillStyle(0xffffff, 1); g.fillCircle(1975, 250, 12);

    // Stage lights
    [920, 1000, 1100, 1200, 1280].forEach((lx, i) => {

      g.fillStyle(lc, 0.7); g.fillCircle(lx, 1330, 8);

    // ── Extra trees around world ──────────────────────────────────

     [2350, 500], [2350, 800], [700, 1150], [1400, 1100], [1800, 1150]

  drawZone(g, x, y, w, h, c1, c2, _label) {
    g.fillStyle(c1, 0.3);
    g.fillRoundedRect(x, y, w, h, 10);
    g.lineStyle(2, c2, 0.5);
    g.strokeRoundedRect(x, y, w, h, 10);
  }

  drawHouse(g, x, y, w, h, wallColor, roofColor, label) {
    // Roof (triangular overhang)
    g.fillStyle(roofColor, 1);
    g.fillTriangle(x - 8, y + 4, x + w / 2, y - 28, x + w + 8, y + 4);
    // Wall
    g.fillStyle(wallColor, 1);
    g.fillRoundedRect(x, y, w, h, 5);
    // Shading on wall right side
    g.fillStyle(0x000000, 0.07);
    g.fillRoundedRect(x + w - 12, y, 12, h, 5);
    // Door
    g.fillStyle(0x4e342e, 1);
    g.fillRoundedRect(x + Math.floor(w / 2) - 12, y + h - 32, 24, 32, 3);
    g.fillStyle(0xd4a030, 1);
    g.fillCircle(x + Math.floor(w / 2) + 6, y + h - 16, 3);
    // Windows
    const winColor = 0xb3e5fc;
    g.fillStyle(winColor, 1);
    if (w >= 130) {
      g.fillRoundedRect(x + 14, y + 18, 28, 24, 3);
      g.fillRoundedRect(x + w - 42, y + 18, 28, 24, 3);
    } else {
      g.fillRoundedRect(x + 14, y + 18, 24, 20, 3);
    }
    // Window cross
    g.lineStyle(1.5, 0x80cbef, 1);
    if (w >= 130) {
      g.lineBetween(x + 28, y + 18, x + 28, y + 42);
      g.lineBetween(x + 14, y + 30, x + 42, y + 30);
      g.lineBetween(x + w - 28, y + 18, x + w - 28, y + 42);
      g.lineBetween(x + w - 42, y + 30, x + w - 14, y + 30);
    }
    // Label above house
    if (label) {
      this.add.text(x + w / 2, y - 36, label, {
        fontSize: '10px', color: '#ffffff',
        stroke: '#000000', strokeThickness: 3,
        resolution: 2
      }).setOrigin(0.5, 1).setDepth(1);
    }
  }

  drawBench(g, x, y) {
    g.fillStyle(0x795548, 1);
    g.fillRoundedRect(x - 18, y - 4, 36, 6, 2); // seat
    g.fillRoundedRect(x - 18, y - 14, 36, 5, 2); // back
    g.fillRoundedRect(x - 16, y + 2, 6, 10, 1);  // leg L
    g.fillRoundedRect(x + 10, y + 2, 6, 10, 1);  // leg R
  }

  plantTree(g, x, y) {
    // Trunk
    g.fillStyle(0x795548, 1);
    g.fillRoundedRect(x - 5, y - 5, 10, 22, 2);
    // Canopy (layered circles for depth)
    g.fillStyle(0x2e7d32, 1); g.fillCircle(x, y - 18, 22);
    g.fillStyle(0x388e3c, 1); g.fillCircle(x - 6, y - 24, 16);
    g.fillStyle(0x43a047, 1); g.fillCircle(x + 5, y - 22, 14);
    g.fillStyle(0x66bb6a, 0.5); g.fillCircle(x - 2, y - 28, 10);
  }

  addWorldLabel(g, x, y, text) {
    this.add.text(x, y, text, {
      fontSize: '13px', color: 'rgba(255,255,255,0.6)',
      stroke: 'rgba(0,0,0,0.5)', strokeThickness: 2,
      letterSpacing: 2, resolution: 2
    }).setOrigin(0.5, 0).setDepth(0.5);
  }

  createNPCAt(id) { return this.npcs[id]; } // already created in create()

  update(time, delta) {
    if (!this.player) return;

    const dt = delta / 1000; // seconds

    // Animate the hole
    this.holeAngle += dt * 1.5;

    // Draw dynamic hole vortex
    if (this.holeDynamic) this.holeDynamic.destroy();
    this.holeDynamic = this.add.graphics().setDepth(1);
    const hg = this.holeDynamic;
    hg.fillStyle(0x000000, 0.9); hg.fillCircle(this.holeX, this.holeY, 32);
    [28, 22, 16, 10].forEach((r, i) => {
      hg.fillStyle([0x1a0033, 0x2d0057, 0x4a0080, 0x7b00ff][i], 0.6 + i * 0.1);
      const ox = Math.cos(this.holeAngle + i) * 3;
      const oy = Math.sin(this.holeAngle + i) * 3;
      hg.fillCircle(this.holeX + ox, this.holeY + oy, r);
    });
    hg.fillStyle(0x000000, 1); hg.fillCircle(this.holeX, this.holeY, 5);

    // ── Player movement ───────────────────────────────────────────
    const speed = 160;
    let vx = 0, vy = 0;
    const left = this.cursors.left.isDown || this.wasd.A.isDown;
    const right = this.cursors.right.isDown || this.wasd.D.isDown;
    const up = this.cursors.up.isDown || this.wasd.W.isDown;
    const down = this.cursors.down.isDown || this.wasd.S.isDown;

    if (left) vx -= speed;
    if (right) vx += speed;
    if (up) vy -= speed;
    if (down) vy += speed;

    // Normalize diagonal
    if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }

    const moving = vx !== 0 || vy !== 0;
    if (moving) {
      this.player.pos.x = Phaser.Math.Clamp(this.player.pos.x + vx * dt, 30, 2370);
      this.player.pos.y = Phaser.Math.Clamp(this.player.pos.y + vy * dt, 30, 1770);
      if (vx !== 0) this.player.facing = vx > 0 ? 1 : -1;
    }

    this.player.walkAnim += dt * (moving ? 8 : 2);
    const playerBob = Math.sin(this.player.walkAnim) * (moving ? 3 : 1);
    this.player.container.setPosition(this.player.pos.x, this.player.pos.y + playerBob);
    this.player.container.setScale(this.player.facing, 1);
    this.player.container.setDepth(this.player.pos.y);

    // ── NPC AI ────────────────────────────────────────────────────
    Object.values(this.npcs).forEach(npc => {
      npc.idleTimer -= delta;

      if (npc.state === 'idle' && npc.idleTimer <= 0) {
        // Pick a new target
        const ha = npc.homeArea;
        // 15% chance to wander toward town square
        const goToTown = Math.random() < 0.15;
        if (goToTown) {
          npc.target = {
            x: 900 + Math.random() * 400,
            y: 640 + Math.random() * 300
          };
        } else {
          npc.target = {
            x: ha.x + Math.random() * ha.w,
            y: ha.y + Math.random() * ha.h
          };
        }
        npc.state = 'walking';
        npc.idleTimer = 3000 + Math.random() * 5000;
      }

      if (npc.state === 'walking') {
        const dx = npc.target.x - npc.pos.x;
        const dy = npc.target.y - npc.pos.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 6) {
          npc.state = 'idle';
          npc.idleTimer = 2000 + Math.random() * 4000;
        } else {
          const speed2 = npc.speed;
          npc.pos.x += (dx / dist) * speed2 * dt;
          npc.pos.y += (dy / dist) * speed2 * dt;
          if (dx !== 0) npc.facing = dx > 0 ? 1 : -1;
        }
      }

      npc.walkAnim += dt * (npc.state === 'walking' ? 7 : 1.5);
      const bob = Math.sin(npc.walkAnim) * (npc.state === 'walking' ? 2.5 : 0.8);
      npc.container.setPosition(npc.pos.x, npc.pos.y + bob);
      npc.container.setScale(npc.facing, 1);
      npc.container.setDepth(npc.pos.y);
    });

    // ── Proximity check ───────────────────────────────────────────
    let nearest = null, nearestDist = Infinity;
    Object.values(this.npcs).forEach(npc => {
      const dx = npc.pos.x - this.player.pos.x;
      const dy = npc.pos.y - this.player.pos.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 90 && d < nearestDist) {
        nearestDist = d;
        nearest = npc;
      }
    });

    const prompt = document.getElementById('proximity-prompt');
    if (nearest && activePersonaId === null) {
      this.proximateNPC = nearest;
      prompt.textContent = `Press E to talk to ${PERSONAS[nearest.id].name}`;
      prompt.classList.add('visible');
    } else {
      this.proximateNPC = null;
      prompt.classList.remove('visible');
    }

    // ── E key to open chat ────────────────────────────────────────
    const eDown = this.eKey.isDown;
    if (eDown && !this.eWasDown && this.proximateNPC) {
      openChat(this.proximateNPC.id);
    }
    this.eWasDown = eDown;
  }

  triggerAction(personaId, actionName) {
    const npc = this.npcs[personaId];
    if (!npc) return;
    const action = actionName.toLowerCase().trim();

    // Stop any ongoing tweens on this container
    this.tweens.killTweensOf(npc.container);

    const cx = npc.pos.x, cy = npc.pos.y;

    switch (action) {
      case 'jump':
        this.tweens.add({
          targets: npc.container, y: cy - 55, duration: 240,
          ease: 'Sine.easeOut', yoyo: true, onComplete: () => npc.container.setY(cy)
        });
        break;
      case 'spin':
        this.tweens.add({
          targets: npc.container, rotation: Math.PI * 2, duration: 550,
          ease: 'Sine.easeInOut', onComplete: () => npc.container.setRotation(0)
        });
        break;
      case 'wave':
        npc.waving = true;
        drawChar(npc.gfx, npc.cfg, true);
        this.time.delayedCall(1600, () => {
          npc.waving = false;
          drawChar(npc.gfx, npc.cfg, false);
        });
        break;
      case 'dance':
        this.tweens.add({
          targets: npc.container, y: cy - 40, duration: 200,
          ease: 'Sine.easeOut', yoyo: true, repeat: 2,
          onComplete: () => {
            this.tweens.add({
              targets: npc.container, rotation: Math.PI * 2, duration: 450,
              ease: 'Cubic.easeInOut',
              onComplete: () => { npc.container.setRotation(0); npc.container.setY(cy); }
            });
          }
        });
        break;
      case 'sit':
        this.tweens.add({
          targets: npc.container, y: cy + 14, scaleY: 0.78, duration: 350,
          ease: 'Back.easeOut', hold: 2200, yoyo: true,
          onComplete: () => { npc.container.setY(cy); npc.container.setScale(npc.facing, 1); }
        });
        break;
      case 'fall':
        this.tweens.add({
          targets: npc.container, rotation: Math.PI / 2, y: cy + 20, duration: 350,
          ease: 'Back.easeIn', hold: 1200, yoyo: true,
          onComplete: () => { npc.container.setRotation(0); npc.container.setY(cy); }
        });
        break;
      case 'nod':
        this.tweens.add({
          targets: npc.container, y: cy - 8, duration: 150,
          ease: 'Sine.easeInOut', yoyo: true, repeat: 3,
          onComplete: () => npc.container.setY(cy)
        });
        break;
      case 'shake':
        this.tweens.add({
          targets: npc.container, x: cx + 10, duration: 80,
          ease: 'Sine.easeInOut', yoyo: true, repeat: 5,
          onComplete: () => npc.container.setX(cx)
        });
        break;
      default:
        // Unknown action — do a small hop
        this.tweens.add({
          targets: npc.container, y: cy - 20, duration: 180,
          ease: 'Sine.easeOut', yoyo: true, onComplete: () => npc.container.setY(cy)
        });
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
//  CHAT SYSTEM
// ═══════════════════════════════════════════════════════════════════
function openChat(personaId) {
  activePersonaId = personaId;
  const p = PERSONAS[personaId];
  document.getElementById('chat-avatar-dot').style.background = p.color;
  document.getElementById('chat-persona-name').textContent = p.name;
  document.getElementById('chat-location').textContent = p.location;
  document.getElementById('chat-panel').classList.add('open');

  // Rebuild message history
  renderMessages(personaId);

  // Greeting if first time
  if (conversations[personaId].length === 0) {
    setTimeout(() => fetchReply(personaId, null, true), 400);
  }

  document.getElementById('chat-input').focus();
}

function closeChat() {
  activePersonaId = null;
  document.getElementById('chat-panel').classList.remove('open');
  document.getElementById('proximity-prompt').classList.remove('visible');
}

function renderMessages(personaId) {
  const box = document.getElementById('chat-messages');
  box.innerHTML = '';
  conversations[personaId].forEach(msg => {
    const div = document.createElement('div');
    div.className = `msg ${msg.role === 'user' ? 'user' : 'npc'}`;
    div.style.background = msg.role === 'assistant'
      ? hexAlpha(PERSONAS[personaId].color, 0.25) : '';
    div.textContent = msg.content;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

function addMessage(personaId, role, content) {
  conversations[personaId].push({ role, content });
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'npc'}`;
  if (role === 'assistant') {
    div.style.background = hexAlpha(PERSONAS[personaId].color, 0.25);
  }
  div.textContent = content;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function showTyping(personaId) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg npc typing';
  div.id = 'typing-indicator';
  div.textContent = '…';
  div.style.background = hexAlpha(PERSONAS[personaId].color, 0.15);
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

async function fetchReply(personaId, userText, isGreeting = false) {
  if (chatBusy) return;
  chatBusy = true;
  document.getElementById('chat-send').disabled = true;

  const p = PERSONAS[personaId];
  const typingEl = showTyping(personaId);

  try {
    const history = conversations[personaId].map(m => ({
      role: m.role, content: m.content
    }));

    if (isGreeting) {
      history.push({ role: 'user', content: '(The player just walked up to you. Say a quick hello in character.)' });
    }

    const res = await fetch('https://sparkling-bar-7008.dannyccash.workers.dev/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        system: p.system + ACTION_SUFFIX,
        messages: history
      })
    });

    const data = await res.json();
    typingEl.remove();

    let text = (data.content && data.content[0] && data.content[0].text) || '(...)';

    // Parse action tag
    const actionMatch = text.match(/\[action:(\w+)\]/i);
    if (actionMatch) {
      text = text.replace(actionMatch[0], '').trim();
      if (gameScene) gameScene.triggerAction(personaId, actionMatch[1]);
    }

    if (!isGreeting) {
      addMessage(personaId, 'assistant', text);
    } else {
      // Don't log the synthetic greeting prompt, just show the reply
      addMessage(personaId, 'assistant', text);
    }

  } catch (err) {
    typingEl.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'msg system';
    errDiv.textContent = '(Connection issue — try again)';
    document.getElementById('chat-messages').appendChild(errDiv);
  }

  chatBusy = false;
  document.getElementById('chat-send').disabled = false;
}

async function sendChatMessage() {
  if (chatBusy || !activePersonaId) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  addMessage(activePersonaId, 'user', text);
  await fetchReply(activePersonaId, text, false);
}

// Chat UI events
document.getElementById('chat-close').addEventListener('click', closeChat);
document.getElementById('chat-send').addEventListener('click', sendChatMessage);
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
  if (e.key === 'Escape') closeChat();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && activePersonaId) closeChat();
});

// ═══════════════════════════════════════════════════════════════════
//  SETUP SCREEN
// ═══════════════════════════════════════════════════════════════════
document.querySelectorAll('.swatch').forEach(s => {
  s.addEventListener('click', () => {
    const group = s.dataset.group;
    document.querySelectorAll(`.swatch[data-group="${group}"]`).forEach(x => x.classList.remove('selected'));
    s.classList.add('selected');
    const val = parseInt(s.dataset.val, 16);
    if (group === 'skin') playerConfig.skinTone = val;
    if (group === 'hair') playerConfig.hairColor = val;
    if (group === 'shirt') playerConfig.shirtColor = val;
  });
});

document.getElementById('enter-btn').addEventListener('click', () => {
  const nameInput = document.getElementById('player-name-input').value.trim();
  playerConfig.name = nameInput || 'You';
  document.getElementById('setup-screen').style.display = 'none';
  startGame();
});

document.getElementById('player-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('enter-btn').click();
});

// ═══════════════════════════════════════════════════════════════════
//  START GAME
// ═══════════════════════════════════════════════════════════════════
function startGame() {
  new Phaser.Game({
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#1a2e1a',
    parent: document.body,
    scene: [GameScene],
    scale: {
      mode: Phaser.Scale.RESIZE,
      autoCenter: Phaser.Scale.CENTER_BOTH
    }
  });
}

// Handle resize
window.addEventListener('resize', () => {
  if (gameScene && gameScene.scale) {
    gameScene.scale.resize(window.innerWidth, window.innerHeight);
  }
});

</script>
