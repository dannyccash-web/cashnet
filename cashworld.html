<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cashworld</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Courier New',monospace}
#wrap{position:relative;width:1024px;height:576px}
#game{display:block;border:2px solid #7c3aed;border-radius:4px}
#clock{position:absolute;top:8px;left:8px;background:rgba(26,10,46,.88);border:2px solid #7c3aed;border-radius:8px;padding:5px 12px;color:#e9d5ff;font-size:12px;pointer-events:none;z-index:10}
#minimap-wrap{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);border:2px solid #7c3aed;border-radius:6px;padding:3px;z-index:10}
#minimap{display:block;border-radius:3px}
#hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(26,10,46,.8);border:1px solid #7c3aed;border-radius:6px;padding:4px 14px;color:#c4b5fd;font-size:11px;pointer-events:none;z-index:10;opacity:0;transition:opacity .3s}
#dialog{position:absolute;bottom:0;left:0;right:0;height:155px;background:#1a0a2e;border-top:3px solid #7c3aed;display:none;z-index:20}
#dp{position:absolute;left:0;top:0;bottom:0;width:125px;background:#2d1b4e;border-right:3px solid #7c3aed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:8px}
#dp canvas{border-radius:50%;border:2px solid #7c3aed}
#dname{color:#e9d5ff;font-size:12px;font-weight:bold;text-align:center}
#dbody{position:absolute;left:125px;right:0;top:0;bottom:0;display:flex;flex-direction:column;padding:10px 14px;gap:7px}
#dtext{flex:1;color:#e9d5ff;font-size:13px;line-height:1.5;overflow-y:auto;white-space:pre-wrap;font-family:'Courier New',monospace}
#drow{display:flex;gap:7px;align-items:center}
#dinput{flex:1;background:#0d0520;border:2px solid #7c3aed;color:#e9d5ff;font-family:'Courier New',monospace;font-size:13px;padding:5px 9px;border-radius:6px;outline:none}
#dinput:focus{border-color:#a855f7}
#dsend{background:#7c3aed;color:#fff;border:none;padding:5px 13px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Courier New',monospace}
#dsend:hover{background:#9333ea}
#dclose{position:absolute;top:6px;right:10px;background:none;border:none;color:#a855f7;font-size:18px;cursor:pointer;line-height:1}
#dclose:hover{color:#e9d5ff}
#thinking{color:#a855f7;font-size:13px;display:none}
</style>
</head>

// ─── DRAWING HELPERS ───────────────────────────────────────
function hex(c){ return typeof c==='string'?c:'#'+c.toString(16).padStart(6,'0'); }

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function adjustColor(hexNum, amt){
  const r=Math.max(0,Math.min(255,((hexNum>>16)&0xff)+amt));
  const g=Math.max(0,Math.min(255,((hexNum>>8)&0xff)+amt));
  const b=Math.max(0,Math.min(255,(hexNum&0xff)+amt));
  return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
}

// Draw Animal Crossing-style character
// Origin: feet at (0,0)
function drawChar(ctx, cfg, opts={}){
  const { waving=false, sleeping=false, flipX=false } = opts;
  const sc = flipX ? -1 : 1;
  ctx.save();
  ctx.scale(sc, 1);

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.ellipse(0,3,17,5,0,0,Math.PI*2); ctx.fill();

  // shoes
  ctx.fillStyle='#333';
  roundRect(ctx,-14,-9,13,8,3); ctx.fill();
  roundRect(ctx,1,-9,13,8,3); ctx.fill();

  // pants/legs
  ctx.fillStyle=hex(cfg.pants);
  roundRect(ctx,-12,-22,10,14,3); ctx.fill();
  roundRect(ctx,2,-22,10,14,3); ctx.fill();

  // body
  ctx.fillStyle=hex(cfg.body);
  roundRect(ctx,-13,-42,26,22,7); ctx.fill();

  // arms
  ctx.fillStyle=hex(cfg.body);
  if(waving){
    roundRect(ctx,-22,-41,10,16,5); ctx.fill(); // left normal
    roundRect(ctx,12,-55,10,18,5); ctx.fill(); // right raised
  } else {
    roundRect(ctx,-22,-41,10,16,5); ctx.fill();
    roundRect(ctx,12,-41,10,16,5); ctx.fill();
  }

  // hands
  ctx.fillStyle=hex(cfg.skin);
  ctx.beginPath(); ctx.arc(-17,-26,5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(waving?17:-17,waving?-48:-26,5,0,Math.PI*2); ctx.fill();
  // correct second hand
  ctx.beginPath(); ctx.arc(17,waving?-48:-26,5,0,Math.PI*2); ctx.fill();

  // neck
  ctx.fillStyle=hex(cfg.skin); ctx.fillRect(-5,-44,10,6);

  // head
  ctx.fillStyle=hex(cfg.skin); ctx.beginPath(); ctx.arc(0,-56,18,0,Math.PI*2); ctx.fill();

  // hair
  if(cfg.hair && cfg.hstyle!=='none'){
    ctx.fillStyle=hex(cfg.hair);
    if(cfg.hstyle==='spiky'){
      ctx.beginPath(); ctx.arc(0,-62,14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=hex(cfg.hair);
      [[-12,-68],[-6,-76],[0,-80],[6,-76],[12,-68]].forEach(([sx,sy])=>{
        ctx.beginPath(); ctx.moveTo(sx-4,-66); ctx.lineTo(sx+4,-66); ctx.lineTo(sx,sy); ctx.closePath(); ctx.fill();
      });
    } else if(cfg.hstyle==='flat'){
      ctx.beginPath(); ctx.arc(0,-62,14,0,Math.PI*2); ctx.fill();
      ctx.fillRect(-18,-70,36,9);
    } else if(cfg.hstyle==='curly'){
      ctx.beginPath(); ctx.arc(0,-63,15,0,Math.PI*2); ctx.fill();
      for(let i=0;i<8;i++){
        const a=i/8*Math.PI*2;
        ctx.beginPath(); ctx.arc(Math.cos(a)*11,-63+Math.sin(a)*8,6,0,Math.PI*2); ctx.fill();
      }
    } else if(cfg.hstyle==='medium'){
      ctx.beginPath(); ctx.arc(0,-62,15,0,Math.PI*2); ctx.fill();
      roundRect(ctx,-16,-74,32,14,4); ctx.fill();
      roundRect(ctx,-20,-68,8,18,4); ctx.fill();
      roundRect(ctx,12,-68,8,18,4); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(0,-62,14,0,Math.PI*2); ctx.fill();
      roundRect(ctx,-16,-73,32,13,4); ctx.fill();
    }
  } else if(cfg.robot){
    ctx.strokeStyle='#90a4ae'; ctx.lineWidth=1.5; ctx.strokeRect(-14,-70,28,13);
    ctx.fillStyle='rgba(144,164,174,0.25)'; ctx.fillRect(-14,-70,28,13);
  }

  // eyes
  if(sleeping){
    ctx.strokeStyle='#3d2b1f'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(-7,-56,4,Math.PI,0,true); ctx.stroke();
    ctx.beginPath(); ctx.arc(7,-56,4,Math.PI,0,true); ctx.stroke();
  } else {
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.ellipse(-7,-56,5.5,6.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(7,-56,5.5,6.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=hex(cfg.eye);
    ctx.beginPath(); ctx.arc(-7,-56,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7,-56,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(-5.5,-54.5,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8.5,-54.5,1.5,0,Math.PI*2); ctx.fill();
    if(cfg.robot){
      ctx.fillStyle='rgba(255,26,0,0.15)';
      ctx.beginPath(); ctx.arc(-7,-56,9,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(7,-56,9,0,Math.PI*2); ctx.fill();
    }
  }

  // nose
  ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.arc(0,-51,2,0,Math.PI*2); ctx.fill();

  // mouth
  if(!sleeping){
    ctx.strokeStyle='#3d2b1f'; ctx.lineWidth=1.8;
    if(cfg.mouth==='happy'||cfg.mouth==='smile'){
      ctx.beginPath(); ctx.arc(0,-47,5,0,Math.PI); ctx.stroke();
    } else if(cfg.mouth==='weary'){
      ctx.beginPath(); ctx.arc(0,-44,4,Math.PI,0); ctx.stroke();
    } else {
      ctx.fillStyle='#3d2b1f'; ctx.fillRect(-4,-46,8,2);
    }
  }

  // zit
  if(cfg.zit){
    ctx.fillStyle='#ff6666'; ctx.beginPath(); ctx.arc(8,-63,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffaaaa'; ctx.beginPath(); ctx.arc(7.2,-63.5,1.4,0,Math.PI*2); ctx.fill();
  }

  // flames
  if(cfg.flames){
    ctx.fillStyle='rgba(255,102,0,0.85)';
    ctx.beginPath(); ctx.moveTo(-6,-73); ctx.lineTo(-2,-87); ctx.lineTo(2,-73); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-2,-71); ctx.lineTo(2,-83); ctx.lineTo(6,-71); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,200,0,0.6)';
    ctx.beginPath(); ctx.moveTo(-2,-71); ctx.lineTo(0,-78); ctx.lineTo(2,-71); ctx.closePath(); ctx.fill();
  }

  ctx.restore();
}

// Draw player character (distinct look)
function drawPlayer(ctx, flipX=false){
  drawChar(ctx, {body:'#fce4ec',pants:'#4a148c',skin:'#ffd5b5',hair:'#4a3728',hstyle:'medium',eye:'#1565c0',mouth:'smile'}, {flipX});
  // little star badge
  ctx.save(); ctx.scale(flipX?-1:1,1);
  ctx.fillStyle='#f06292';
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5-Math.PI/2;
    const b=a+Math.PI/5;
    if(i===0) ctx.moveTo(Math.cos(a)*5,-33+Math.sin(a)*5);
    else ctx.lineTo(Math.cos(a)*5,-33+Math.sin(a)*5);
    ctx.lineTo(Math.cos(b)*2,-33+Math.sin(b)*2);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ─── WORLD RENDERING ───────────────────────────────────────
let worldCanvas, worldCtx;

function buildWorld(){
  worldCanvas = document.createElement('canvas');
  worldCanvas.width=WW; worldCanvas.height=WH;
  const ctx=worldCanvas.getContext('2d');

  // grass
  ctx.fillStyle='#4a7c59'; ctx.fillRect(0,0,WW,WH);
  // grass variation
  for(let i=0;i<100;i++){
    ctx.fillStyle=Math.random()<0.5?'rgba(61,107,74,0.4)':'rgba(83,122,94,0.3)';
    ctx.beginPath(); ctx.arc(Math.random()*WW,Math.random()*WH,20+Math.random()*60,0,Math.PI*2); ctx.fill();
  }

  // roads
  ctx.fillStyle='#555566'; ctx.fillRect(0,840,WW,80);
  ctx.fillStyle='#666677'; ctx.fillRect(0,852,WW,56);
  ctx.fillStyle='rgba(255,238,85,0.7)';
  for(let x=0;x<WW;x+=120){ ctx.fillRect(x,878,60,4); }

  ctx.fillStyle='#555566'; ctx.fillRect(1100,0,80,WH);
  ctx.fillStyle='#666677'; ctx.fillRect(1112,0,56,WH);
  ctx.fillStyle='rgba(255,238,85,0.7)';
  for(let y=0;y<WH;y+=120){ ctx.fillRect(1128,y,4,60); }

  // sidewalks
  ctx.fillStyle='rgba(180,180,200,0.75)';
  ctx.fillRect(0,820,WW,20); ctx.fillRect(0,920,WW,20);
  ctx.fillRect(1080,0,20,WH); ctx.fillRect(1180,0,20,WH);

  // buildings
  drawBldg(ctx,100,80,190,160,'#8b5e3c','🏠 Home',true);
  drawBldg(ctx,320,70,150,140,'#7a8c5e','',true);
  drawBldg(ctx,80,270,140,130,'#5e7a8c','',true);
  drawBldg(ctx,1650,80,290,230,'#546e7a','💼 CASHNET HQ',false);
  drawBldg(ctx,1970,110,160,180,'#607d8b','',false);
  drawBldg(ctx,1690,340,200,150,'#78909c','',false);
  drawBldg(ctx,450,1300,210,170,'#d4a574','☕ CAFÉ',false);
  drawBldg(ctx,1650,1280,330,260,'#4a1560','★ THE VENUE',false);

  // neon venue border
  ctx.strokeStyle='rgba(255,0,255,0.5)'; ctx.lineWidth=3; ctx.strokeRect(1650,1280,330,260);
  ctx.strokeStyle='rgba(0,255,255,0.3)'; ctx.lineWidth=2; ctx.strokeRect(1658,1288,314,244);

  // park
  ctx.fillStyle='#5d9e6d'; ctx.beginPath(); ctx.arc(1210,910,230,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a8a5a'; ctx.beginPath(); ctx.arc(1210,910,190,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(68,153,187,0.8)'; ctx.beginPath(); ctx.ellipse(1210,910,75,55,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(85,170,204,0.4)'; ctx.beginPath(); ctx.ellipse(1210,906,60,42,0,0,Math.PI*2); ctx.fill();

  // trees
  const trees=[[1060,790],[1360,790],[1030,1010],[1390,1010],[1210,770],[1210,1050],
    [300,600],[500,400],[700,700],[900,500],[1500,610],[1620,410],[400,1110],[800,1210],
    [1510,1110],[2010,810],[2110,620],[2210,910]];
  trees.forEach(([tx,ty])=>drawTree(ctx,tx,ty));

  // flowers
  const fcols=['#ff6688','#ffcc44','#ff88aa','#cc44ff','#44ccff'];
  for(let i=0;i<80;i++){
    ctx.fillStyle=fcols[Math.floor(Math.random()*fcols.length)];
    ctx.globalAlpha=0.75;
    ctx.beginPath(); ctx.arc(Math.random()*WW,Math.random()*WH,3.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // zone labels (faint)
  ctx.font='bold 20px Courier New'; ctx.textAlign='center'; ctx.globalAlpha=0.35;
  ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=3;
  [['🏠 Homes',230,620],['💼 Work District',1850,580],['🌳 Park',1210,1160],['☕ Café',560,1510],['★ The Venue',1820,1570]].forEach(([t,x,y])=>{
    ctx.strokeText(t,x,y); ctx.fillText(t,x,y);
  });
  ctx.globalAlpha=1;

  // world border
  ctx.strokeStyle='#2d1b4e'; ctx.lineWidth=8; ctx.strokeRect(4,4,WW-8,WH-8);
  ctx.strokeStyle='rgba(124,58,237,0.4)'; ctx.lineWidth=3; ctx.strokeRect(8,8,WW-16,WH-16);
}

function drawBldg(ctx,x,y,w,h,col,label,chimney){
  ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(x+6,y+6,w,h);
  ctx.fillStyle=col; ctx.fillRect(x,y,w,h);
  ctx.fillStyle=adjustColor(parseInt(col.slice(1),16),-35);
  ctx.beginPath(); ctx.moveTo(x-10,y); ctx.lineTo(x+w/2,y-42); ctx.lineTo(x+w+10,y); ctx.closePath(); ctx.fill();
  // door
  ctx.fillStyle='#4a3020'; roundRect(ctx,x+w/2-13,y+h-42,26,42,3); ctx.fill();
  ctx.fillStyle='#7a5030'; roundRect(ctx,x+w/2-11,y+h-40,22,40,2); ctx.fill();
  // windows
  ctx.fillStyle='rgba(136,204,255,0.7)';
  roundRect(ctx,x+14,y+24,30,26,3); ctx.fill();
  roundRect(ctx,x+w-44,y+24,30,26,3); ctx.fill();
  if(h>130){ roundRect(ctx,x+14,y+74,30,26,3); ctx.fill(); roundRect(ctx,x+w-44,y+74,30,26,3); ctx.fill(); }
  if(chimney){ ctx.fillStyle='#6b4c3b'; ctx.fillRect(x+w/2+18,y-52,18,32); }
  if(label){
    ctx.font='bold 11px Courier New'; ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.strokeStyle='#000'; ctx.lineWidth=2.5;
    ctx.strokeText(label,x+w/2,y+h/2+5); ctx.fillText(label,x+w/2,y+h/2+5);
  }
}

function drawTree(ctx,x,y){
  ctx.fillStyle='#3d2b1a'; ctx.fillRect(x-5,y-22,10,26);
  ctx.fillStyle='rgba(45,122,58,0.9)'; ctx.beginPath(); ctx.arc(x,y-32,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(61,155,74,0.7)'; ctx.beginPath(); ctx.arc(x-8,y-40,18,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+8,y-40,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(85,187,90,0.5)'; ctx.beginPath(); ctx.arc(x,y-46,13,0,Math.PI*2); ctx.fill();
}

// ─── GAME STATE ────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{ if(!state.dialogOpen) keys[e.key]=true; if(e.key==='e'||e.key==='E') tryInteract(); });
window.addEventListener('keyup',e=>{ keys[e.key]=false; });

const player={ x:600,y:500,speed:180,facing:1,bobOffset:0 };
const cam={ x:0,y:0 };

const PKEYS = Object.keys(PERSONAS);
const npcs = {};
PKEYS.forEach((k,i)=>{
  const z=ZONES.home[i];
  npcs[k]={
    x:z.x,y:z.y,
    tx:z.x,ty:z.y,
    facing:1,
    zone:'home',
    waitTimer:2+Math.random()*3,
    bubble:null, // {text,alpha,timer}
    waving:false,
    animType:null,
    animTimer:0,
    animOY:0, // original Y for jump
    animAngle:0,
    chatHistory:[],
    lastAmbient:0,
  };
});

const state={ dialogOpen:false, activeNPC:null, nearNPC:null };

// ─── DIALOG UI ─────────────────────────────────────────────
const dlg=document.getElementById('dialog');
const dinput=document.getElementById('dinput');
const dtext=document.getElementById('dtext');
const dsend=document.getElementById('dsend');
const dclose=document.getElementById('dclose');
const thinking=document.getElementById('thinking');

dinput.addEventListener('keydown',e=>{ e.stopPropagation(); if(e.key==='Enter')sendMsg(); });
dinput.addEventListener('keyup',e=>e.stopPropagation());
dsend.onclick=()=>sendMsg();
dclose.onclick=()=>closeDialog();

function openDialog(k){
  if(state.dialogOpen)return;
  state.dialogOpen=true;
  state.activeNPC=k;
  npcs[k].tx=npcs[k].x; npcs[k].ty=npcs[k].y; // freeze
  document.getElementById('dname').textContent=PERSONAS[k].name;
  drawPortrait(k);
  dtext.textContent='';
  dlg.style.display='block';
  callAI(k,'You just bumped into the player. Brief friendly greeting to start.',true);
  setTimeout(()=>dinput.focus(),80);
}

function closeDialog(){
  state.dialogOpen=false;
  state.activeNPC=null;
  dlg.style.display='none';
  dtext.textContent='';
  dinput.value='';
}

async function sendMsg(){
  if(!state.activeNPC)return;
  const msg=dinput.value.trim(); if(!msg)return;
  dinput.value='';
  await callAI(state.activeNPC,msg,false);
}

async function callAI(k,msg,greeting){
  const p=PERSONAS[k]; const npc=npcs[k];
  thinking.style.display='inline'; dsend.disabled=true;
  if(!greeting) dtext.textContent+='\n\nYou: '+msg;
  const hist=npc.chatHistory;
  if(!greeting) hist.push({role:'user',content:msg});
  try{
    const r=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,system:p.sys,
        messages:greeting?[{role:'user',content:msg}]:hist})});
    const d=await r.json();
    let reply=d?.content?.[0]?.text||'...';
    const am=reply.match(/\[action:(\w+)\]/i);
    if(am){ triggerAnim(k,am[1].toUpperCase()); reply=reply.replace(/\[action:\w+\]/gi,'').trim(); }
    if(!greeting) hist.push({role:'assistant',content:reply});
    if(hist.length>20) hist.splice(0,2);
    const prefix=greeting?p.name+': ':'\n\n'+p.name+': ';
    dtext.textContent+=prefix;
    for(const ch of reply){ dtext.textContent+=ch; dtext.scrollTop=dtext.scrollHeight; await sleep(16); }
    showBubble(k,reply.slice(0,90)+(reply.length>90?'…':''));
  }catch(e){ dtext.textContent+='\n\n[Connection issue]'; }
  thinking.style.display='none'; dsend.disabled=false;
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function drawPortrait(k){
  const pc=document.getElementById('portrait'); const c=pc.getContext('2d');
  c.clearRect(0,0,80,80);
  c.fillStyle='#2d1b4e'; c.beginPath(); c.arc(40,40,38,0,Math.PI*2); c.fill();
  c.save(); c.beginPath(); c.arc(40,40,37,0,Math.PI*2); c.clip();
  c.translate(40,72); c.scale(0.62,0.62);
  drawChar(c,PERSONAS[k].body);
  c.restore();
}

// ─── BUBBLES ───────────────────────────────────────────────
function showBubble(k,text){ npcs[k].bubble={text,alpha:1,timer:4500}; }

// ─── ANIMATIONS ────────────────────────────────────────────
function triggerAnim(k,type){
  const n=npcs[k];
  n.animType=type; n.animTimer=0; n.animAngle=0;
  n.animOY=n.y; n.waving=false;
  if(type==='WAVE'){n.waving=true; setTimeout(()=>{n.waving=false;n.animType=null;},2000);}
}

function updateAnim(k,dt){
  const n=npcs[k];
  if(!n.animType)return;
  n.animTimer+=dt;
  const t=n.animTimer;
  if(n.animType==='JUMP'){
    const prog=(t%0.5)/0.5;
    n.y=n.animOY-Math.sin(prog*Math.PI)*40;
    if(t>1.5){n.y=n.animOY;n.animType=null;}
  } else if(n.animType==='SPIN'){
    n.animAngle=t*360;
    if(t>0.9){n.animAngle=0;n.animType=null;}
  } else if(n.animType==='DANCE'){
    n.y=n.animOY-Math.abs(Math.sin(t*10))*20;
    n.animAngle=Math.sin(t*10)*15;
    if(t>1.5){n.y=n.animOY;n.animAngle=0;n.animType=null;}
  } else if(n.animType==='NOD'){
    n.animAngle=Math.sin(t*15)*12;
    if(t>1){n.animAngle=0;n.animType=null;}
  } else if(n.animType==='SHAKE'){
    n.x=n.tx+(Math.sin(t*30)*8);
    if(t>1){n.x=n.tx;n.animType=null;}
  }
}

// ─── AMBIENT CHAT ──────────────────────────────────────────
setInterval(checkAmbient,30000);
async function checkAmbient(){
  if(state.dialogOpen)return;
  const ks=PKEYS;
  for(let i=0;i<ks.length;i++) for(let j=i+1;j<ks.length;j++){
    const a=npcs[ks[i]],b=npcs[ks[j]];
    const dx=a.x-b.x,dy=a.y-b.y;
    if(dx*dx+dy*dy<160*160){
      const now=Date.now();
      if(now-a.lastAmbient>90000&&now-b.lastAmbient>90000){
        a.lastAmbient=b.lastAmbient=now;
        runAmbient(ks[i],ks[j]); return;
      }
    }
  }
}

async function runAmbient(ka,kb){
  const pa=PERSONAS[ka],pb=PERSONAS[kb];
  const opener=AMBIENT[Math.floor(Math.random()*AMBIENT.length)];
  try{
    const ra=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:50,system:pa.sys,
        messages:[{role:'user',content:`Say something brief (one sentence, no action tags) to ${pb.name} while hanging out in Cashworld.`}]})});
    const da=await ra.json();
    const la=(da?.content?.[0]?.text||'').replace(/\[action:\w+\]/gi,'').trim();
    if(la) showBubble(ka,la);
    await sleep(3500);
    const rb=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:50,system:pb.sys,
        messages:[{role:'user',content:`${pa.name} said: "${la}". Reply in one sentence, no action tags.`}]})});
    const db=await rb.json();
    const lb=(db?.content?.[0]?.text||'').replace(/\[action:\w+\]/gi,'').trim();
    if(lb) showBubble(kb,lb);
  }catch(e){}
}

// ─── SCHEDULE ──────────────────────────────────────────────
function getET(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'})); }
function updateSchedule(){
  const h=getET().getHours();
  PKEYS.forEach((k,i)=>{
    const sched=SCHEDULE[k];
    const slot=sched.find(s=>h>=s.s&&h<s.e)||sched[0];
    const n=npcs[k];
    if(n.zone!==slot.z&&!state.dialogOpen){
      n.zone=slot.z;
      const tgts=ZONES[slot.z];
      const tgt=tgts[i%tgts.length];
      n.tx=tgt.x; n.ty=tgt.y;
    }
  });
}
updateSchedule();
setInterval(updateSchedule,60000);

// clock
function updateClock(){
  const s=getET().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  document.getElementById('ctime').textContent=s+' ET';
}
updateClock(); setInterval(updateClock,30000);

// ─── INTERACTION ───────────────────────────────────────────
function tryInteract(){
  if(state.dialogOpen){closeDialog();return;}
  if(state.nearNPC) openDialog(state.nearNPC);
}

// ─── MAIN LOOP ─────────────────────────────────────────────
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const mmc=document.getElementById('minimap');
const mmx=mmc.getContext('2d');

buildWorld();

let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.05); last=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(t=>{last=t;requestAnimationFrame(loop);});

function update(dt){
  if(!state.dialogOpen){
    let vx=0,vy=0;
    if(keys['a']||keys['A']||keys['ArrowLeft']) vx-=1;
    if(keys['d']||keys['D']||keys['ArrowRight']) vx+=1;
    if(keys['w']||keys['W']||keys['ArrowUp']) vy-=1;
    if(keys['s']||keys['S']||keys['ArrowDown']) vy+=1;
    if(vx&&vy){vx*=0.707;vy*=0.707;}
    player.x=Math.max(20,Math.min(WW-20,player.x+vx*player.speed*dt));
    player.y=Math.max(20,Math.min(WH-20,player.y+vy*player.speed*dt));
    if(vx) player.facing=vx>0?1:-1;
    if(vx||vy) player.bobOffset+=dt*8;
  }

  // NPC movement
  PKEYS.forEach(k=>{
    const n=npcs[k];
    if(state.dialogOpen&&state.activeNPC===k) return;
    updateAnim(k,dt);
    const dx=n.tx-n.x,dy=n.ty-n.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<8){
      if(n.waitTimer>0){ n.waitTimer-=dt; }
      else{
        const tgts=ZONES[n.zone];const base=tgts[PKEYS.indexOf(k)%tgts.length];
        n.tx=base.x+(Math.random()-.5)*130; n.ty=base.y+(Math.random()-.5)*130;
        n.tx=Math.max(30,Math.min(WW-30,n.tx)); n.ty=Math.max(30,Math.min(WH-30,n.ty));
        n.waitTimer=2+Math.random()*4;
      }
    } else {
      const spd=65; n.x+=dx/d*spd*dt; n.y+=dy/d*spd*dt;
      if(dx) n.facing=dx>0?1:-1;
    }

    // bubble timer
    if(n.bubble){
      n.bubble.timer-=dt*1000;
      if(n.bubble.timer<500) n.bubble.alpha=n.bubble.timer/500;
      if(n.bubble.timer<=0) n.bubble=null;
    }
  });

  // camera
  cam.x=Math.max(0,Math.min(WW-VW,player.x-VW/2));
  cam.y=Math.max(0,Math.min(WH-VH,player.y-VH/2));

  // near NPC
  let nearest=null,nearDist=85;
  PKEYS.forEach(k=>{
    const n=npcs[k];
    const dx=player.x-n.x,dy=player.y-n.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<nearDist){nearDist=d;nearest=k;}
  });
  state.nearNPC=nearest;
  const hint=document.getElementById('hint');
  if(nearest&&!state.dialogOpen){
    hint.style.opacity='1';
    hint.textContent='Press E to talk to '+PERSONAS[nearest].name;
  } else { hint.style.opacity='0'; }
}

function render(){
  ctx.clearRect(0,0,VW,VH);

  // world
  ctx.drawImage(worldCanvas,-cam.x,-cam.y);

  // sort draw order by Y
  const drawList=[];
  PKEYS.forEach(k=>{
    const n=npcs[k];
    drawList.push({type:'npc',k,y:n.y});
  });
  drawList.push({type:'player',y:player.y});
  drawList.sort((a,b)=>a.y-b.y);

  drawList.forEach(d=>{
    if(d.type==='player'){
      const sx=Math.round(player.x-cam.x), sy=Math.round(player.y-cam.y);
      ctx.save(); ctx.translate(sx,sy);
      const bob=Math.sin(player.bobOffset)*2;
      ctx.translate(0,bob);
      drawPlayer(ctx,player.facing<0);
      ctx.restore();
      // label
      ctx.save();
      ctx.font='bold 11px Courier New'; ctx.textAlign='center';
      ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.strokeText('YOU',sx,sy-82);
      ctx.fillStyle='#ffe082'; ctx.fillText('YOU',sx,sy-82);
      ctx.restore();
    } else {
      const n=npcs[d.k];
      const sx=Math.round(n.x-cam.x), sy=Math.round(n.y-cam.y);
      ctx.save(); ctx.translate(sx,sy);
      if(n.animAngle) ctx.rotate(n.animAngle*Math.PI/180);
      drawChar(ctx,PERSONAS[d.k].body,{waving:n.waving,flipX:n.facing<0});
      ctx.restore();
      // label
      ctx.save();
      ctx.font='bold 11px Courier New'; ctx.textAlign='center';
      ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.strokeText(PERSONAS[d.k].name,sx,sy-84);
      ctx.fillStyle='#fff'; ctx.fillText(PERSONAS[d.k].name,sx,sy-84);
      ctx.restore();
      // bubble
      if(n.bubble&&n.bubble.alpha>0){
        ctx.save(); ctx.globalAlpha=n.bubble.alpha;
        drawBubble(ctx,sx,sy-95,n.bubble.text);
        ctx.restore();
      }
    }
  });

  renderMinimap();
}

function drawBubble(ctx,x,y,text){
  const maxW=150, pad=9;
  ctx.font='10px Courier New'; ctx.textAlign='center';
  const words=text.split(' '); let lines=[],line='';
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW-pad*2){lines.push(line);line=w;}
    else line=test;
  }
  if(line) lines.push(line);
  const lh=13,tw=lines.reduce((m,l)=>Math.max(m,ctx.measureText(l).width),0)+pad*2;
  const th=lines.length*lh+pad*1.5;
  const bx=x-tw/2,by=y-th-6;
  // box
  ctx.fillStyle='rgba(255,254,240,0.95)';
  roundRect(ctx,bx,by,tw,th,6); ctx.fill();
  ctx.strokeStyle='rgba(100,100,80,0.5)'; ctx.lineWidth=1;
  roundRect(ctx,bx,by,tw,th,6); ctx.stroke();
  // tail
  ctx.fillStyle='rgba(255,254,240,0.95)';
  ctx.beginPath(); ctx.moveTo(x-5,y-6); ctx.lineTo(x+5,y-6); ctx.lineTo(x,y); ctx.closePath(); ctx.fill();
  // text
  ctx.fillStyle='#111';
  lines.forEach((l,i)=>ctx.fillText(l,x,by+pad+lh*i+lh*0.8));
}

function renderMinimap(){
  const mw=130,mh=98,sx=mw/WW,sy=mh/WH;
  mmx.fillStyle='#2a4a3a'; mmx.fillRect(0,0,mw,mh);
  mmx.fillStyle='#555566';
  mmx.fillRect(0,840*sy,mw,80*sy); mmx.fillRect(1100*sx,0,80*sx,mh);
  // zones
  [{x:80,y:70,w:350,h:360,c:'rgba(90,140,80,0.5)'},{x:1640,y:70,w:400,h:350,c:'rgba(80,110,130,0.5)'},
   {x:1090,y:790,w:280,h:280,c:'rgba(70,140,100,0.5)'},{x:440,y:1280,w:230,h:220,c:'rgba(200,160,80,0.5)'},
   {x:1640,y:1260,w:360,h:290,c:'rgba(80,20,100,0.5)'}].forEach(z=>{
    mmx.fillStyle=z.c; mmx.fillRect(z.x*sx,z.y*sy,z.w*sx,z.h*sy);
  });
  PKEYS.forEach(k=>{
    const n=npcs[k];
    mmx.fillStyle=PERSONAS[k].dot;
    mmx.beginPath(); mmx.arc(n.x*sx,n.y*sy,3.5,0,Math.PI*2); mmx.fill();
  });
  mmx.fillStyle='#ffe082';
  mmx.beginPath(); mmx.arc(player.x*sx,player.y*sy,4.5,0,Math.PI*2); mmx.fill();
  mmx.strokeStyle='#fff'; mmx.lineWidth=1.5; mmx.stroke();
}
</script>
